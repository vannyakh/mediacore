name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync
        run: uv sync --extra dev
      - name: Import check
        run: uv run python -c "from packages.engine.engine import MediaCoreEngine; from apps.api.main import create_app"
      - name: Pytest (PR suite)
        run: >
          uv run pytest
          -m "not load and not stress and not chaos and not benchmark"
          --cov=packages --cov=providers --cov=apps
          --cov-report=term-missing
          --cov-report=xml
      - name: Benchmark smoke
        run: uv run python -m packages.mediacore_benchmark.runner
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync
        run: uv sync --extra dev
      - name: Dependency audit
        continue-on-error: true
        run: |
          uv pip install pip-audit
          uv run pip-audit
